<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>프로 당구 챌린지</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-wrapper">
        <div id="ui-layer">
            <div class="stat-box">
                <span class="label">SCORE</span>
                <span id="score">0</span>
            </div>
            <div id="best-score-wrapper">
                <span class="label">BEST RECORD</span>
                <span id="best-score">0</span>
            </div>
            <div id="life-container">
                <div class="heart">♥</div>
                <div class="heart">♥</div>
                <div class="heart">♥</div>
            </div>
            <div class="stat-box">
                <span class="label">COMBO</span>
                <span id="combo">x1</span>
            </div>
        </div>

        <div id="table-container">
            <canvas id="gameCanvas"></canvas>
            <!-- 파워 게이지 -->
            <div id="power-bar-container">
                <div id="power-bar-fill"></div>
            </div>
        </div>

        <div id="overlay" class="hidden">
            <h1 id="status-text">GAME OVER</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">RESTART</button>
        </div>

        <div id="clear-overlay" class="hidden">
            <h1 id="clear-status-text">CLEAR</h1>
            <p id="clear-time-text">Time: <span id="clear-time">00:00</span></p>
            <div class="button-group">
                <button id="clear-restart-btn">RESTART</button>
                <button id="exit-btn">EXIT</button>
            </div>
        </div>
        
        <div id="guide-msg">공을 드래그하여 조준하고 쏘세요!</div>
    </div>
    <script src="main.js"></script>
</body>
</html>
